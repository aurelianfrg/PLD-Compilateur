name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: install depedencies
        run: sudo apt-get update && sudo apt-get install -y python3

      - name: run tests
        working-directory: ./compiler
        run: make test
